<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favi.png">
    <title>Porlito</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" crossorigin src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Porlito",
      "url": "https://porlito.co.za/"
    }
    </script>
</head>
<body>
    <h1>Porlito Grammar Specialist</h1>
    
    <textarea id="user-input" rows="4" cols="50">undocimented code is bad</textarea><br>
    
    <button id="fix-btn" py-click="run_fix">Fix Grammar</button>
    
    <div id="output">Initializing System (Downloading 150MB+)...</div>

    <script type="py">
        import os
        import sys
        import asyncio
        import pyodide
        from pyscript import document

        # --- CONFIGURATION ---
        base_url = "https://raw.githubusercontent.com/Porlito/Inference-engine/main/visheratin%E2%81%84t5-efficient-tiny-grammar-correction/"
        
        files_to_fetch = {
            f"{base_url}A.py": "inference_logic.py",
            f"{base_url}config.json": "model/config.json",
            f"{base_url}pytorch_model.bin": "model/pytorch_model.bin",
            f"{base_url}tokenizer.json": "model/tokenizer.json",
            f"{base_url}special_tokens_map.json": "model/special_tokens_map.json"
        }

        async def initialize_app():
            try:
                # 1. Using the pyodide engine directly to load packages
                document.getElementById("output").innerText = "Installing Torch & Transformers..."
                await pyodide.code.load_package(["torch", "transformers", "numpy"])
                
                # 2. Fetch files using the low-level pyodide fetcher
                for url, local_path in files_to_fetch.items():
                    document.getElementById("output").innerText = f"Downloading: {local_path}..."
                    
                    if "/" in local_path:
                        os.makedirs(os.path.dirname(local_path), exist_ok=True)
                    
                    # Direct binary fetch
                    response = await pyodide.http.pyfetch(url)
                    if response.status == 200:
                        content = await response.bytes()
                        with open(local_path, "wb") as f:
                            f.write(content)
                    else:
                        raise Exception(f"Failed {local_path} (Status {response.status})")

                # 3. Path setup and import
                sys.path.append(os.getcwd())
                global inference_logic
                import inference_logic
                
                document.getElementById("output").innerText = "Specialist Ready!"
            except Exception as e:
                document.getElementById("output").innerText = f"Startup Error: {str(e)}"

        # Run the async initialization
        asyncio.ensure_future(initialize_app())

        def run_fix(event):
            try:
                text = document.getElementById("user-input").value
                document.getElementById("output").innerText = "Analyzing..."
                fixed_text = inference_logic.fix_it(text)
                document.getElementById("output").innerText = fixed_text
            except Exception as e:
                document.getElementById("output").innerText = f"Processing Error: {str(e)}"
    </script>
</body>
</html>
